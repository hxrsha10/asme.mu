<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASME | Marwadi University</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .hero-bg { background-color: #1e3a8a; background-image: url('hero-photo.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; }
        .hero-overlay { background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.7)); }
        .asme-logo { height: 40px; width: 40px; object-fit: cover; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.2); filter: brightness(1.1); }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-blue-900 text-white p-3 sticky top-0 z-50 shadow-xl">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-2">
            <div class="flex items-center space-x-3">
                <img src="logo.png" alt="ASME MU Logo" class="asme-logo flex-shrink-0">
                <div class="border-l border-white/20 pl-3">
                    <h1 class="text-lg md:text-2xl font-bold tracking-tight italic leading-tight">ASME <span class="font-light text-blue-200 text-sm md:text-lg not-italic">| MU</span></h1>
                </div>
            </div>
            <ul class="flex items-center space-x-3 md:space-x-6 text-[10px] md:text-xs uppercase tracking-widest font-semibold">
                <li><a href="index.html" class="text-blue-300">Home</a></li>
                <li><a href="committee.html" class="hover:text-blue-300 transition">Team</a></li>
                <li><a href="events.html" class="hover:text-blue-300 transition">Events</a></li>
                <li><a href="join.html" class="bg-blue-700 px-3 py-1.5 md:px-6 md:py-2 rounded-lg hover:bg-blue-600 shadow-md">Join</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero-bg relative text-white py-20 md:py-32 px-4 text-center min-h-screen flex items-center">
        <div class="hero-overlay absolute inset-0 z-0"></div>
        <div class="container mx-auto relative z-10">
            <h2 class="text-4xl md:text-7xl font-black mb-6 uppercase tracking-tighter">ASME <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-white"> MU</span></h2>
            <p class="text-base md:text-xl text-blue-100 max-w-2xl mx-auto mb-10 font-light px-4">The official student chapter of the American Society of Mechanical Engineers at Marwadi University.</p>
            <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
                <a href="committee.html" class="w-full sm:w-auto bg-white text-blue-900 px-8 py-3 rounded-lg font-bold shadow-xl">Meet the Team</a>
                <a href="events.html" class="w-full sm:w-auto bg-blue-700 text-white border border-blue-400 px-8 py-3 rounded-lg font-bold shadow-xl">Explore Events</a>
            </div>
        </div>
    </header>

    <footer class="bg-gray-900 text-white py-8 text-center text-[10px] text-gray-500 uppercase tracking-widest">&copy; 2026 Mechanical Department.</footer>
</body>
</html>
